template:
  bootstrap: 5
  bootswatch: sandstone
  light-switch: true
  bslib:
    pkgdown-nav-height: 100px
  params:
    ganalytics: UA-199996472-1

deploy:
  install_metadata: true

url: https://aravind-j.github.io/gglyph/

navbar:
  structure:
    left:  [home, reference, news]
    right: [search, github, lightswitch]
  components:
    home:
      icon: fa-home fa-lg
      text: Home
      href: index.html
    reference:
      icon: fa-code
      text: Reference
      href: reference/index.html
    news:
      icon: far fa-newspaper
      text: News
      href: news/index.html


home:
  sidebar:
    structure: [links, license, citation, authors, dev]

reference:
    - title: Geoms
      contents:
         - '`geom_dotglyph`'
         - '`geom_metroglyph`'
         - '`geom_pieglyph`'
         - '`geom_profileglyph`'
         - '`geom_starglyph`'
         - '`geom_tileglyph`'

    - title: Grobs
      contents:
         - '`dotglyphGrob`'
         - '`metroglyphGrob`'
         - '`pieglyphGrob`'
         - '`profileglyphGrob`'
         - '`starglyphGrob`'
         - '`tileglyphGrob`'

    - title: Helpers
      contents:
         - '`gglyph.repel.control`'
         - '`gglyph.segment.control`'
         - '`scale_z_continuous`'
         - '`guide_z_order`'
         - '`addlabel.glyphGrob`'
